version: '3.8'

services:
  selenium-java:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: selenium-java-bdd
    environment:
      - BROWSER=chrome
      - HEADLESS=false
    volumes:
      - ./target:/workspace/target
      - ./screenshots:/workspace/screenshots
    ports:
      - "4444:4444"
    networks:
      - selenium-network

  # Optional: Chrome standalone container for remote Selenium Grid
  chrome:
    image: selenium/standalone-chrome:latest
    container_name: chrome-browser
    shm_size: 2gb
    ports:
      - "7900:7900"
      - "4444:4444"
    networks:
      - selenium-network
    environment:
      - SE_NODE_MAX_SESSIONS=3
      - SE_SESSION_RETRY_INTERVAL=5
      - SE_SESSION_REQUEST_TIMEOUT=300
      - SE_NODE_SESSION_TIMEOUT=300

  # Optional: Firefox standalone container for remote Selenium Grid
  firefox:
    image: selenium/standalone-firefox:latest
    container_name: firefox-browser
    shm_size: 2gb
    ports:
      - "7901:7900"
      - "4445:4444"
    networks:
      - selenium-network
    environment:
      - SE_NODE_MAX_SESSIONS=3
      - SE_SESSION_RETRY_INTERVAL=5
      - SE_SESSION_REQUEST_TIMEOUT=300
      - SE_NODE_SESSION_TIMEOUT=300

networks:
  selenium-network:
    driver: bridge

volumes:
  maven-cache:
    driver: local
